<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Health Record – Lifeline</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background-color: #0d1b2a; color: #c8e0ec; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2.5rem 1rem; }
        .page-wrapper { width: 100%; max-width: 580px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #4dd9ac; text-decoration: none; margin-bottom: 1.25rem; transition: color 0.15s; }
        .back-link:hover { color: #7aecc4; }
        .back-link svg { width: 15px; height: 15px; }
        .form-card { background: #112236; border: 1px solid #1e3a52; border-radius: 14px; padding: 2rem; }
        .form-header { display: flex; align-items: center; gap: 14px; padding-bottom: 1.5rem; border-bottom: 1px solid #1e3a52; margin-bottom: 1.75rem; }
        .header-icon { width: 46px; height: 46px; border-radius: 10px; background: #0a2e3f; border: 1px solid #1e4d63; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .header-icon svg { width: 22px; height: 22px; stroke: #4dd9ac; }
        .form-title { font-size: 17px; font-weight: 600; color: #e8f4f1; margin-bottom: 3px; }
        .form-subtitle { font-size: 12px; color: #5a7a8a; }
        .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #4dd9ac; margin-bottom: 0.875rem; }
        .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
        .field-group { display: flex; flex-direction: column; gap: 6px; }
        .field-group.full { grid-column: 1 / -1; }
        label { font-size: 12px; font-weight: 500; color: #7a9aaa; display: flex; align-items: center; gap: 5px; }
        label svg { width: 13px; height: 13px; stroke: #5a7a8a; }
        .input-wrap { position: relative; }
        .input-wrap input, .input-wrap textarea { width: 100%; padding: 9px 44px 9px 12px; font-size: 14px; font-family: inherit; color: #c8e0ec; background: #0a1e2e; border: 1px solid #1e3a52; border-radius: 8px; outline: none; transition: border-color 0.15s, box-shadow 0.15s; appearance: none; -webkit-appearance: none; }
        .input-wrap textarea { padding-right: 12px; resize: vertical; min-height: 96px; line-height: 1.6; }
        .input-wrap input:focus, .input-wrap textarea:focus { border-color: #4dd9ac; box-shadow: 0 0 0 3px rgba(77,217,172,0.12); }
        .input-wrap input::placeholder, .input-wrap textarea::placeholder { color: #2e4e62; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .unit { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); font-size: 11px; font-weight: 500; color: #2e5068; pointer-events: none; user-select: none; }
        .divider { height: 1px; background: #1e3a52; margin: 1.25rem 0; }
        .form-actions { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-top: 1.75rem; padding-top: 1.25rem; border-top: 1px solid #1e3a52; }
        .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 20px; font-size: 13px; font-weight: 500; font-family: inherit; border-radius: 8px; cursor: pointer; transition: background 0.15s, color 0.15s; border: 1px solid transparent; }
        .btn svg { width: 15px; height: 15px; }
        .btn-secondary { background: transparent; border-color: #1e3a52; color: #5a7a8a; }
        .btn-secondary:hover { border-color: #2e5068; color: #7a9aaa; }
        .btn-primary { background: #4dd9ac; color: #041a13; font-weight: 600; border-color: #4dd9ac; }
        .btn-primary:hover { background: #3bc99c; border-color: #3bc99c; }
        .btn-primary:active { transform: scale(0.98); }
        @media (max-width: 480px) { body { padding: 1.5rem 1rem; } .field-grid { grid-template-columns: 1fr; } .form-card { padding: 1.5rem; } }
    </style>
</head>
<body>
<div class="page-wrapper">

    <a th:href="@{/dashboard}" href="/dashboard" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        Back to dashboard
    </a>

    <div class="form-card">
        <div class="form-header">
            <div class="header-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
            </div>
            <div>
                <p class="form-title">Add health record</p>
                <p class="form-subtitle">Log your vitals and health metrics</p>
            </div>
        </div>

      <form th:action="@{/health/save}"
      th:object="${healthRecord}"
      method="post">

            <!-- Body Measurements -->
            <p class="section-label">Body measurements</p>
            <div class="field-grid">
                <div class="field-group">
                    <label for="weight">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                        Weight
                    </label>
                    <div class="input-wrap">
                        <input type="number" step="0.1" id="weight" name="weight" placeholder="0.0" required>
                        <span class="unit">kg</span>
                    </div>
                </div>
                <div class="field-group">
                    <label for="height">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="4"></line><polyline points="4 8 12 4 20 8"></polyline></svg>
                        Height
                    </label>
                    <div class="input-wrap">
                        <input type="number" step="0.1" id="height" name="height" placeholder="0.0" required>
                        <span class="unit">cm</span>
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <!-- Vital Signs -->
            <p class="section-label">Vital signs</p>
            <div class="field-grid">
                <div class="field-group">
                    <label for="bloodPressure">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                        Blood pressure
                    </label>
                    <div class="input-wrap">
                        <input type="text" id="bloodPressure" name="bloodPressure" placeholder="120/80" required>
                        <span class="unit">mmHg</span>
                    </div>
                </div>
                <div class="field-group">
                    <label for="sugarLevel">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c0 0-7 8-7 13a7 7 0 0 0 14 0c0-5-7-13-7-13z"></path></svg>
                        Sugar level
                    </label>
                    <div class="input-wrap">
                        <input type="number" step="0.1" id="sugarLevel" name="sugarLevel" placeholder="0.0" required>
                        <span class="unit">mg/dL</span>
                    </div>
                </div>
                <div class="field-group">
                    <label for="bloodGroup">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c0 0-7 8-7 13a7 7 0 0 0 14 0c0-5-7-13-7-13z"></path><line x1="12" y1="10" x2="12" y2="14"></line><line x1="10" y1="12" x2="14" y2="12"></line></svg>
                        Blood group
                    </label>
                    <div class="input-wrap">
                        <input type="text" id="bloodGroup" name="bloodGroup" placeholder="O+" required>
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <!-- Notes & Additional Info -->
            <p class="section-label">Notes &amp; additional info</p>
            <div class="field-grid">
                <div class="field-group full">
                    <label for="allergies">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                        Allergies
                    </label>
                    <div class="input-wrap">
                        <textarea id="allergies" name="allergies" placeholder="Dust, pollen, medicine allergy..."></textarea>
                    </div>
                </div>
                <div class="field-group full">
                    <label for="notes">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                        Additional notes
                    </label>
                    <div class="input-wrap">
                        <textarea id="notes" name="notes" placeholder="Any observations, symptoms, or context..."></textarea>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/dashboard}" href="/dashboard" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    Save record
                </button>
            </div>

        </form>
    </div>
</div>
</body>
</html>
